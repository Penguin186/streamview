<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>StreamView Hybrid</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/727/727245.png">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

h1 {
  text-align: center;
  padding: 20px;
}

#matches {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
}

.title {
  font-size: 15px;
  margin-bottom: 10px;
}

button {
  background: #22c55e;
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

/* modal */
#modal {
  position: fixed;
  inset: 0;
  background: black;
  display: none;
  flex-direction: column;
  z-index: 9999;
}

#topbar {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  background: #111;
}

#close {
  background: red;
  border: none;
  color: white;
  padding: 6px 10px;
  cursor: pointer;
}

#video, #frame {
  flex: 1;
  width: 100%;
  border: none;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<h1>Live Streams (Hybrid Player)</h1>

<div id="matches"></div>

<!-- MODAL -->
<div id="modal">
  <div id="topbar">
    <div id="title">Playing</div>
    <button id="close">Close</button>
  </div>

  <video id="video" controls autoplay class="hidden"></video>
  <iframe id="frame" class="hidden" allow="autoplay; fullscreen"></iframe>
</div>

<script>
const API_BASE = "https://streamed.pk/api";

async function fetchAPI(url) {
  const res = await fetch(url);
  return res.json();
}

/* ---------- LOAD MATCHES ---------- */
async function loadMatches() {
  const container = document.getElementById("matches");
  container.innerHTML = "Loading...";

  const matches = await fetchAPI(`${API_BASE}/matches/live`);
  container.innerHTML = "";

  matches.forEach(match => {
    const card = document.createElement("div");
    card.className = "card";

    const title = document.createElement("div");
    title.className = "title";
    title.textContent = match.title || "Live Match";

    const btn = document.createElement("button");
    btn.textContent = "Watch";

    btn.onclick = async () => {
      btn.disabled = true;
      btn.textContent = "Loading...";

      try {
        const streams = await Promise.all(
          (match.sources || []).map(src =>
            fetchAPI(`${API_BASE}/stream/${src.source}/${src.id}`).catch(() => [])
          )
        );

        const flat = streams.flat().filter(s => s?.embedUrl);

        if (!flat.length) {
          btn.textContent = "No streams";
          return;
        }

        openStream(flat[0].embedUrl, match.title);

      } catch (e) {
        console.error(e);
        btn.textContent = "Error";
      }
    };

    card.appendChild(title);
    card.appendChild(btn);
    container.appendChild(card);
  });
}

/* ---------- STREAM DETECTION ---------- */
function isHLS(url) {
  return typeof url === "string" && url.includes(".m3u8");
}

/* ---------- PLAYER ---------- */
function openStream(url, title) {
  const modal = document.getElementById("modal");
  const video = document.getElementById("video");
  const frame = document.getElementById("frame");
  const label = document.getElementById("title");

  label.textContent = title || "Playing";

  video.classList.add("hidden");
  frame.classList.add("hidden");

  modal.style.display = "flex";

  // CLEANUP
  video.pause();
  video.src = "";
  frame.src = "";

  if (window.hls) {
    window.hls.destroy();
  }

  /* ---------- HLS MODE ---------- */
  if (isHLS(url)) {
    video.classList.remove("hidden");

    if (Hls.isSupported()) {
      const hls = new Hls({
        lowLatencyMode: true
      });

      window.hls = hls;
      hls.loadSource(url);
      hls.attachMedia(video);
    } else {
      video.src = url;
    }

    video.play().catch(() => {});
    return;
  }

  /* ---------- EMBED MODE ---------- */
  frame.classList.remove("hidden");
  frame.src = url;
}

/* ---------- CLOSE ---------- */
document.getElementById("close").onclick = () => {
  document.getElementById("modal").style.display = "none";

  const video = document.getElementById("video");
  const frame = document.getElementById("frame");

  video.pause();
  video.src = "";
  frame.src = "";

  if (window.hls) {
    window.hls.destroy();
  }
};

loadMatches();
setInterval(loadMatches, 60000);
</script>

</body>
</html>
