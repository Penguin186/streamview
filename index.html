<!DOCTYPE html>
<html>
<head>
  <title>Live Sports Streams</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    h1 {
      text-align: center;
      padding: 20px;
    }

    #matches {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    .title {
      font-size: 18px;
      margin-bottom: 10px;
    }

    button {
      background: #22c55e;
      border: none;
      padding: 10px 15px;
      color: black;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    iframe {
      width: 100%;
      height: 200px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    .status {
      text-align: center;
      opacity: 0.7;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>🔥 Live Sports Streams</h1>
<div id="matches">Loading...</div>

<script>
async function loadMatches() {
  const container = document.getElementById('matches');
  container.innerHTML = "Loading...";

  try {
    const res = await fetch('https://streamed.pk/api/matches/live');
    const matches = await res.json();

    container.innerHTML = "";

    matches.forEach(match => {
      const card = document.createElement('div');
      card.className = "card";

      const title = document.createElement('div');
      title.className = "title";
      title.innerText = match.title || "Live Match";

      const btn = document.createElement('button');
      btn.innerText = "▶ Watch";

      const streamContainer = document.createElement('div');

      btn.onclick = async () => {
        btn.disabled = true;
        btn.innerText = "Loading...";

        try {
          for (const src of match.sources || []) {
            const streamRes = await fetch(
              `https://streamed.pk/api/stream/${src.source}/${src.id}`
            );
            const streams = await streamRes.json();

            if (streams.length > 0) {
              const iframe = document.createElement('iframe');
              iframe.src = streams[0].embedUrl;
              streamContainer.appendChild(iframe);

              btn.style.display = "none";
              return;
            }
          }

          btn.innerText = "No streams found";
        } catch (e) {
          btn.innerText = "Error loading";
        }
      };

      card.appendChild(title);
      card.appendChild(btn);
      card.appendChild(streamContainer);

      container.appendChild(card);
    });

    if (matches.length === 0) {
      container.innerHTML = "No live matches right now.";
    }

  } catch (err) {
    container.innerHTML = "Error loading matches.";
  }
}

// Auto refresh every 60 seconds
loadMatches();
setInterval(loadMatches, 60000);
</script>

</body>
</html>
