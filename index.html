<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StreamView</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#0f172a;color:#f1f5f9;min-height:100vh}
#header{padding:16px 20px;border-bottom:1px solid #1e293b;display:flex;align-items:center;justify-content:space-between}
#header h1{font-size:18px;font-weight:600;display:flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;border-radius:50%;background:#e24b4a;display:inline-block;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#refresh-btn{font-size:13px;background:none;border:1px solid #334155;color:#94a3b8;padding:6px 14px;border-radius:8px;cursor:pointer}
#refresh-btn:hover{background:#1e293b}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;padding:20px}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:10px}
.card-sport{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.06em}
.card-title{font-size:14px;font-weight:500;color:#f1f5f9;line-height:1.4}
.live-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;background:#450a0a;color:#fca5a5;padding:3px 9px;border-radius:20px;width:fit-content}
.watch-btn{margin-top:4px;background:#22c55e;border:none;color:#fff;font-size:13px;font-weight:600;padding:9px;border-radius:8px;cursor:pointer;transition:background .15s}
.watch-btn:hover{background:#16a34a}
.watch-btn:disabled{background:#334155;color:#64748b;cursor:not-allowed}
.status{text-align:center;padding:3rem;color:#64748b;font-size:14px;grid-column:1/-1}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #334155;border-top-color:#94a3b8;border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
#player-section{display:none;padding:0 20px 20px}
#player-wrap{border-radius:12px;overflow:hidden;border:1px solid #334155}
#player-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#1e293b;border-bottom:1px solid #334155}
#player-title{font-size:14px;font-weight:500;color:#f1f5f9}
#close-btn{font-size:12px;background:#450a0a;color:#fca5a5;border:none;border-radius:6px;padding:5px 12px;cursor:pointer}
#player-frame{width:100%;height:420px;border:none;background:#000;display:block}
#streams-bar{display:flex;gap:6px;padding:10px 14px;background:#1e293b;border-top:1px solid #334155;flex-wrap:wrap}
.stream-btn{font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid #334155;background:transparent;color:#94a3b8;cursor:pointer}
.stream-btn:hover{background:#334155}
.stream-btn.active{background:#166534;color:#86efac;border-color:transparent}
</style>
</head>
<body>

<div id="header">
  <h1><span class="dot"></span> StreamView</h1>
  <button id="refresh-btn" onclick="loadMatches()">↻ Refresh</button>
</div>

<div id="player-section">
  <div id="player-wrap">
    <div id="player-bar">
      <span id="player-title">Now playing</span>
      <button id="close-btn" onclick="closePlayer()">✕ Close</button>
    </div>
    <iframe id="player-frame" allow="autoplay; fullscreen" allowfullscreen></iframe>
    <div id="streams-bar"></div>
  </div>
</div>

<div id="grid">
  <div class="status"><span class="spinner"></span>Loading matches…</div>
</div>

<script>
const PROXY = "https://green-tree-e168.poetic-lice.workers.dev";

async function api(path) {
  const r = await fetch(PROXY + path);
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

function sportLabel(cat) {
  const map = {football:"Football",soccer:"Soccer",basketball:"Basketball",tennis:"Tennis",cricket:"Cricket",rugby:"Rugby",hockey:"Hockey",baseball:"Baseball",mma:"MMA",boxing:"Boxing",golf:"Golf",f1:"Formula 1",motorsport:"Motorsport"};
  return map[(cat||"").toLowerCase()] || cat || "Sport";
}

async function loadMatches() {
  const grid = document.getElementById("grid");
  grid.innerHTML = '<div class="status"><span class="spinner"></span>Loading matches…</div>';
  try {
    const matches = await api("/api/matches/live");
    if (!matches?.length) {
      grid.innerHTML = '<div class="status">No live matches right now</div>';
      return;
    }
    grid.innerHTML = "";
    matches.forEach(m => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="card-sport">${sportLabel(m.category || m.sport)}</div>
        <div class="card-title">${m.title || "Live Match"}</div>
        <div class="live-badge"><span style="width:6px;height:6px;border-radius:50%;background:#e24b4a;display:inline-block"></span>Live</div>
        <button class="watch-btn" id="btn-${m.id}">Watch</button>`;
      card.querySelector(".watch-btn").onclick = () => watchMatch(m);
      grid.appendChild(card);
    });
  } catch(e) {
    grid.innerHTML = '<div class="status">Could not load matches — proxy may be warming up, try refreshing</div>';
  }
}

async function watchMatch(m) {
  const btn = document.getElementById("btn-" + m.id);
  if (btn) { btn.disabled = true; btn.textContent = "Loading…"; }
  try {
    const sources = m.sources || [];
    if (!sources.length) {
      if (btn) { btn.disabled = false; btn.textContent = "No sources"; }
      return;
    }
    const results = await Promise.all(
      sources.map(s => api(`/api/stream/${s.source}/${s.id}`).catch(() => []))
    );
    const streams = results.flat().filter(s => s?.embedUrl);
    if (!streams.length) {
      if (btn) { btn.disabled = false; btn.textContent = "No streams found"; }
      return;
    }
    streams.sort((a, b) => (b.hd === true) - (a.hd === true));
    openPlayer(m.title, streams, 0);
    if (btn) { btn.disabled = false; btn.textContent = "Watch"; }
  } catch(e) {
    if (btn) { btn.disabled = false; btn.textContent = "Error — retry"; }
  }
}

function openPlayer(title, streams, idx) {
  const section = document.getElementById("player-section");
  const frame = document.getElementById("player-frame");
  const bar = document.getElementById("streams-bar");
  document.getElementById("player-title").textContent = title || "Now playing";
  frame.src = streams[idx].embedUrl;
  section.style.display = "block";
  bar.innerHTML = "";
  streams.forEach((s, i) => {
    const b = document.createElement("button");
    b.className = "stream-btn" + (i === idx ? " active" : "");
    b.textContent = (s.hd ? "HD " : "") + "Stream " + (i + 1);
    b.onclick = () => {
      frame.src = s.embedUrl;
      bar.querySelectorAll(".stream-btn").forEach((x, j) => x.className = "stream-btn" + (j === i ? " active" : ""));
    };
    bar.appendChild(b);
  });
  section.scrollIntoView({ behavior: "smooth", block: "start" });
}

function closePlayer() {
  document.getElementById("player-section").style.display = "none";
  document.getElementById("player-frame").src = "";
}

loadMatches();
setInterval(loadMatches, 60000);
</script>
</body>
</html>
