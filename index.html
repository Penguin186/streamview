<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>StreamView</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/727/727245.png">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

h1 {
  text-align: center;
  padding: 18px;
}

#matches {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 14px;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 14px;
  border-radius: 12px;
}

.title {
  font-size: 15px;
  margin-bottom: 10px;
}

button {
  background: #22c55e;
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  width: 100%;
}

.loader {
  text-align: center;
  opacity: 0.7;
}

/* MODAL */
#modal {
  position: fixed;
  inset: 0;
  background: black;
  display: none;
  flex-direction: column;
  z-index: 9999;
}

#topbar {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  background: #111;
}

#close {
  background: red;
  border: none;
  color: white;
  padding: 6px 10px;
  cursor: pointer;
}

#frame {
  flex: 1;
  width: 100%;
  border: none;
}
</style>
</head>

<body>

<h1>Live Streams</h1>

<div id="matches">
  <div class="loader">Loading matches...</div>
</div>

<!-- PLAYER -->
<div id="modal">
  <div id="topbar">
    <div id="title">Playing</div>
    <button id="close">Close</button>
  </div>
  <iframe id="frame" allow="autoplay; fullscreen"></iframe>
</div>

<script>
const API_BASE = "https://streamed.pk/api";

/* ---------------- FETCH ---------------- */
async function fetchAPI(url) {
  const res = await fetch(url);
  return res.json();
}

/* ---------------- LOAD MATCHES ---------------- */
async function loadMatches() {
  const container = document.getElementById("matches");
  container.innerHTML = '<div class="loader">Loading matches...</div>';

  try {
    const matches = await fetchAPI(`${API_BASE}/matches/live`);
    container.innerHTML = "";

    if (!matches?.length) {
      container.innerHTML = '<div class="loader">No live matches</div>';
      return;
    }

    matches.forEach(match => {
      const card = document.createElement("div");
      card.className = "card";

      const title = document.createElement("div");
      title.className = "title";
      title.textContent = match.title || "Live Match";

      const btn = document.createElement("button");
      btn.textContent = "Watch";

      btn.onclick = async () => {
        btn.disabled = true;
        btn.textContent = "Loading...";

        try {
          const results = await Promise.all(
            (match.sources || []).map(src =>
              fetchAPI(`${API_BASE}/stream/${src.source}/${src.id}`).catch(() => [])
            )
          );

          let streams = results.flat().filter(s => s?.embedUrl);

          if (!streams.length) {
            btn.textContent = "No streams";
            return;
          }

          streams = rankStreams(streams);

          const working = await tryStreams(streams);

          if (!working) {
            btn.textContent = "No working stream";
            return;
          }

          openPlayer(working, match.title);

        } catch (err) {
          console.error(err);
          btn.textContent = "Error";
        }
      };

      card.appendChild(title);
      card.appendChild(btn);
      container.appendChild(card);
    });

  } catch (err) {
    console.error(err);
    container.innerHTML = '<div class="loader">Error loading matches</div>';
  }
}

/* ---------------- STREAM RANKING ---------------- */
function rankStreams(streams) {
  return streams.sort((a, b) => {
    return (b.hd === true) - (a.hd === true);
  });
}

/* ---------------- STREAM TEST ---------------- */
function testEmbed(url) {
  return new Promise(resolve => {
    const iframe = document.createElement("iframe");
    iframe.style.display = "none";
    iframe.src = url;

    let done = false;

    const timeout = setTimeout(() => {
      if (!done) {
        done = true;
        resolve(false);
      }
    }, 4000);

    iframe.onload = () => {
      if (!done) {
        done = true;
        clearTimeout(timeout);
        resolve(true);
      }
    };

    document.body.appendChild(iframe);
  });
}

/* ---------------- TRY STREAMS ---------------- */
async function tryStreams(streams) {
  for (const s of streams) {
    if (!s.embedUrl) continue;

    const ok = await testEmbed(s.embedUrl);
    if (ok) return s.embedUrl;
  }
  return null;
}

/* ---------------- PLAYER ---------------- */
function openPlayer(url, title) {
  const modal = document.getElementById("modal");
  const frame = document.getElementById("frame");
  const label = document.getElementById("title");

  label.textContent = title || "Playing";
  frame.src = url;

  modal.style.display = "flex";
}

/* ---------------- CLOSE ---------------- */
document.getElementById("close").onclick = () => {
  document.getElementById("modal").style.display = "none";
  document.getElementById("frame").src = "";
};

/* ---------------- INIT ---------------- */
loadMatches();
setInterval(loadMatches, 60000);
</script>

</body>
</html>
